name: Release
on:
  push:
    tags: ["v*"]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_PROJECT_NAME: ${{secrets.CLOUDFLARE_PROJECT_NAME}}
  CLOUDFLARE_COMPATIBILITY_DATE: 2026-01-03
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build Frontend
        run: nix build
      - run: |
          mkdir -p build
          cp -r result/dist/* result/dist/.* build/
      - name: Deploy to Cloudlfare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.57.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/.svelte-kit/cloudflare --project-name="${{env.CLOUDFLARE_PROJECT_NAME}}" --branch=main --commit-dirty=true
